name: Build & Release Qwik App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # Android Build + Release
  # ─────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/qwik-release-key.keystore

      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=qwik-release-key.keystore\n' \
            "${{ secrets.STORE_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            > android/key.properties

      - name: Build release APK (signed)
        run: flutter build apk --release

      - name: Build App Bundle (signed)
        run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk qwik-release.apk
          cp build/app/outputs/bundle/release/app-release.aab qwik-release.aab

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}-${{ github.run_number }}
          name: "Qwik ${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## Qwik App — Release Build ${{ github.run_number }}

            ### Download
            - **APK** → `qwik-release.apk` (direct install on Android)
            - **AAB** → `qwik-release.aab` (for Google Play Store)

            ### Install APK
            1. Download `qwik-release.apk`
            2. Enable "Install from unknown sources" on your Android device
            3. Open the downloaded file and install

            ---
            Built from commit: ${{ github.sha }}
          files: |
            qwik-release.apk
            qwik-release.aab
          draft: false
          prerelease: false

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: qwik-release-apk
          path: qwik-release.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # iOS Build (no signing)
  # ─────────────────────────────────────────
  build-ios:
    name: Build iOS (no signing)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build iOS (no code sign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: qwik-ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 14
