name: Build & Release Qwik App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # Android Build + GitHub Release
  # ─────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (warnings allowed)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test --no-pub

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/qwik-release-key.keystore

      - name: Write key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=qwik-release-key.keystore\n' \
            "${{ secrets.STORE_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            > android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Rename outputs
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk qwik-release.apk
          cp build/app/outputs/bundle/release/app-release.aab  qwik-release.aab

      - name: Get version from pubspec
        id: ver
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "tag=v${VER}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=Qwik ${VER} (Build ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          body: |
            ## 📲 Qwik — Android Release

            ### ডাউনলোড করুন
            | ফাইল | ব্যবহার |
            |------|---------|
            | `qwik-release.apk` | সরাসরি Android ফোনে ইনস্টল |
            | `qwik-release.aab` | Google Play Store আপলোড |

            ### APK ইনস্টল করার নিয়ম
            1. `qwik-release.apk` ডাউনলোড করুন
            2. ফোনে Settings → Security → "Unknown sources" চালু করুন
            3. ডাউনলোড করা ফাইলটি খুলুন → Install করুন

            ---
            Commit: `${{ github.sha }}`
          files: |
            qwik-release.apk
            qwik-release.aab
          draft: false
          prerelease: false

      - name: Upload APK as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: qwik-release-apk-build${{ github.run_number }}
          path: qwik-release.apk
          retention-days: 90
