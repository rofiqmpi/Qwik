name: Build & Release Qwik App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test --no-pub

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Rename outputs
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk  qwik-release.apk
          cp build/app/outputs/bundle/release/app-release.aab qwik-release.aab
          ls -lh qwik-release.apk qwik-release.aab

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "tag=v${VER}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=Qwik ${VER} (Build ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          body: |
            ## 📲 Qwik — Android Release Build ${{ github.run_number }}

            ### ⬇️ ডাউনলোড করুন
            | ফাইল | কাজ |
            |------|-----|
            | **qwik-release.apk** | সরাসরি Android ফোনে ইনস্টল করুন |
            | **qwik-release.aab** | Google Play Store-এ আপলোড করুন |

            ### 📱 APK ইনস্টল করার নিয়ম
            1. নিচে থেকে `qwik-release.apk` ডাউনলোড করুন
            2. ফোনে **Settings → Security → Unknown sources** চালু করুন
            3. ডাউনলোড করা ফাইল খুলুন → **Install** করুন

            ---
            Built from commit: `${{ github.sha }}`
          files: |
            qwik-release.apk
            qwik-release.aab
          draft: false
          prerelease: false

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: qwik-apk-build${{ github.run_number }}
          path: qwik-release.apk
          retention-days: 90
