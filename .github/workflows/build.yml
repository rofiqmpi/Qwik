name: Build & Release Qwik App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || \
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install required Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" 2>/dev/null || true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate missing Gradle wrapper files
        run: |
          if [ ! -f android/gradlew ]; then
            echo "gradlew not found — generating via flutter create..."
            flutter create \
              --project-name temp \
              --org com.temp \
              --platforms android \
              /tmp/flutter_gen
            cp /tmp/flutter_gen/android/gradlew           android/gradlew
            cp /tmp/flutter_gen/android/gradle/wrapper/gradle-wrapper.jar \
               android/gradle/wrapper/gradle-wrapper.jar
            chmod +x android/gradlew
            echo "✅ Gradle wrapper generated"
          else
            echo "gradlew already exists ✅"
          fi
          ls -lh android/gradlew android/gradle/wrapper/

      - name: Write android/local.properties
        run: |
          echo "flutter.sdk=$(flutter --version --machine 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['flutterRoot'])" 2>/dev/null \
            || dirname $(dirname $(which flutter)))" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          cat android/local.properties

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test --no-pub

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk qwik-release.apk
          ls -lh qwik-release.apk

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "tag=v${VER}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=Qwik ${VER} (Build ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          body: |
            ## 📲 Qwik — Android Release Build ${{ github.run_number }}

            ### ⬇️ ডাউনলোড করুন
            **`qwik-release.apk`** — সরাসরি Android ফোনে ইনস্টল করুন

            ### 📱 ইনস্টল করার নিয়ম
            1. নিচে থেকে `qwik-release.apk` ডাউনলোড করুন
            2. ফোনে **Settings → Security → Unknown sources** চালু করুন
            3. ডাউনলোড করা ফাইল খুলুন → **Install** করুন

            ---
            Built from commit: `${{ github.sha }}`
          files: qwik-release.apk
          draft: false
          prerelease: false

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: qwik-apk-build${{ github.run_number }}
          path: qwik-release.apk
          retention-days: 90
