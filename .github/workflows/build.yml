name: Build & Release Qwik App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test --no-pub

      - name: Generate release keystore with keytool
        run: |
          keytool -genkeypair \
            -alias qwik \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -keystore android/app/qwik-release-key.keystore \
            -storepass "Qwik2024Secure" \
            -keypass "Qwik2024Secure" \
            -dname "CN=Qwik App, OU=Mobile, O=Qwik, L=Dhaka, ST=Dhaka, C=BD" \
            -storetype pkcs12 \
            -noprompt
          echo "✅ Keystore generated successfully"
          keytool -list -keystore android/app/qwik-release-key.keystore \
            -storepass "Qwik2024Secure" -noprompt

      - name: Write key.properties
        run: |
          cat > android/key.properties << 'EOF'
          storePassword=Qwik2024Secure
          keyPassword=Qwik2024Secure
          keyAlias=qwik
          storeFile=qwik-release-key.keystore
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Rename outputs
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk qwik-release.apk
          cp build/app/outputs/bundle/release/app-release.aab qwik-release.aab

      - name: Save keystore as artifact (download & store as secret for future)
        run: |
          base64 -w 0 android/app/qwik-release-key.keystore > qwik-keystore.b64
          echo "⚠️ Download 'keystore-backup' artifact and save as KEYSTORE_BASE64 secret for consistent signing"

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "tag=v${VER}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=Qwik ${VER} (Build ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          body: |
            ## 📲 Qwik — Android Release Build ${{ github.run_number }}

            ### ⬇️ ডাউনলোড করুন
            | ফাইল | কাজ |
            |------|-----|
            | **qwik-release.apk** | সরাসরি Android ফোনে ইনস্টল করুন |
            | **qwik-release.aab** | Google Play Store-এ আপলোড করুন |

            ### 📱 APK ইনস্টল করার নিয়ম
            1. `qwik-release.apk` ডাউনলোড করুন
            2. ফোনে **Settings → Security → Unknown sources** চালু করুন
            3. ডাউনলোড করা ফাইল খুলুন → **Install** করুন

            ---
            Built from: `${{ github.sha }}`
          files: |
            qwik-release.apk
            qwik-release.aab
          draft: false
          prerelease: false

      - name: Upload keystore backup
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup-build${{ github.run_number }}
          path: qwik-keystore.b64
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwik-apk-build${{ github.run_number }}
          path: qwik-release.apk
          retention-days: 90
